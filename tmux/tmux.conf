# --- Window naming & Claude integration ---
set-window-option -g automatic-rename on
set-option -g set-titles on
set-option -g automatic-rename-format '#($DOTFILES_DIR/tmux/claude-session-name.sh #{pane_pid} #{pane_current_command} #{pane_id})#{?pane_dead,[dead],}'

# --- General ---
set -g status-keys vi
set -g history-limit 25000
set -g default-terminal "screen-256color"
set -sa terminal-features ',screen-256color:RGB'
set -sg escape-time 0
set -g status-interval 2
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g focus-events on
set -g allow-passthrough on

# Use the user's default shell (set by setup.sh at install time)
run-shell 'tmux set -g default-shell "$(command -v zsh 2>/dev/null || echo /bin/sh)"'

# --- Input ---
setw -g mode-keys vi
setw -g mouse on

# --- Copy/paste (vi-style, cross-platform clipboard) ---
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "$DOTFILES_DIR/tmux/clipboard-copy.sh"

# OSC 52 clipboard — works in most modern terminals without pbcopy/xclip
set -g set-clipboard on

# --- Splits & pane resizing ---
bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"

bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key H resize-pane -L 5
bind-key L resize-pane -R 5

bind-key M-j resize-pane -D
bind-key M-k resize-pane -U
bind-key M-h resize-pane -L
bind-key M-l resize-pane -R

# --- Smart pane switching with vim awareness ---
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l"  "select-pane -R"
bind-key -n 'C-\' if-shell "$is_vim" "send-keys C-\\" "select-pane -l"
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Reload config
bind r source-file ~/.tmux.conf

# --- Appearance ---

# Panes
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour117
set -g pane-border-lines single
set -g pane-border-indicators arrows
set -g pane-border-status top
set -g pane-border-format "#($DOTFILES_DIR/tmux/pane-border-info.sh #{pane_pid})"

# Modes
setw -g clock-mode-colour colour135
setw -g mode-style fg=colour196,bg=colour238,bold

# Statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style bg=colour234,fg=colour137,dim
set -g status-left ''
set -g status-right '#[fg=colour233,bg=colour241,bold] %d/%m #[fg=colour233,bg=colour245,bold] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length 40

# Window tabs: Claude (✴) in light orange, others in light green
setw -g window-status-current-style fg=colour81,bg=colour238,bold
setw -g window-status-current-format ' #{?#{m:*✴*,#W},#[fg=colour215],#[fg=colour114]}#W#[fg=colour50]#F '

setw -g window-status-style fg=colour138,bg=colour235,none
setw -g window-status-format ' #{?#{m:*✴*,#W},#[fg=colour215],#[fg=colour114]}#W#[fg=colour244]#F '

setw -g window-status-bell-style fg=colour255,bg=colour1,bold

# Messages
set -g message-style fg=colour232,bg=colour166,bold
set -g message-command-style fg=blue,bg=black

# Quiet
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none

# --- Plugins (via TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto-save sessions every 15 min, auto-restore on tmux start
set -g @continuum-restore 'on'

# Restore vim/neovim sessions if Session.vim exists
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

# Initialize TPM (must be last line)
run-shell '[ -d ~/.tmux/plugins/tpm ] && ~/.tmux/plugins/tpm/tpm'
